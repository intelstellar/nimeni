<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>koishi's page</title>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <style>
        :root {
            --bg-color: white;
            --text-color: black;
        }

        html.dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .theme-switcher {
            position: fixed;
            top: 30px;
            right: 30px;
            background-color: var(--text-color);
            color: var(--bg-color);
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 20px;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .theme-switcher:hover {
            opacity: 0.8;
            transform: scale(1.05);
        }

        .players-container {
            opacity: 1;
            transition: opacity 3s ease;
        }

        .players-container.fading {
            opacity: 0;
        }

        iframe {
            transition: opacity 3s ease;
        }
    </style>
</head>
<body>
    <button class="theme-switcher" id="themeToggle">🌙</button>

    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const htmlElement = document.documentElement;
        const playersContainer = document.getElementById('playersContainer');

        // Define player data with light and dark mode URLs
        const playerData = [
            {
                light: "https://bandcamp.com/EmbeddedPlayer/album=514537703/size=large/bgcol=ffffff/linkcol=0687f5/transparent=true/",
                dark: "https://bandcamp.com/EmbeddedPlayer/album=514537703/size=large/bgcol=000001/linkcol=0f91ff/transparent=true/"
            },
            {
                light: "https://bandcamp.com/EmbeddedPlayer/album=3290504340/size=large/bgcol=ffffff/linkcol=0687f5/tracklist=true/transparent=true/",
                dark: "https://bandcamp.com/EmbeddedPlayer/album=3290504340/size=large/bgcol=000001/linkcol=0f91ff/tracklist=true/transparent=true/"
            },
            {
                light: "https://bandcamp.com/EmbeddedPlayer/album=357073096/size=large/bgcol=ffffff/linkcol=0687f5/tracklist=true/transparent=true/",
                dark: "https://bandcamp.com/EmbeddedPlayer/album=357073096/size=large/bgcol=000001/linkcol=0f91ff/tracklist=true/transparent=true/"
            },
            {
                light: "https://bandcamp.com/EmbeddedPlayer/album=2350190403/size=large/bgcol=ffffff/linkcol=0687f5/track=2955052642/transparent=true/",
                dark: "https://bandcamp.com/EmbeddedPlayer/album=2350190403/size=large/bgcol=000001/linkcol=0f91ff/track=2955052642/transparent=true/"
            },
            {
                light: "https://bandcamp.com/EmbeddedPlayer/album=1496503449/size=large/bgcol=ffffff/linkcol=0687f5/transparent=true/",
                dark: "https://bandcamp.com/EmbeddedPlayer/album=1496503449/size=large/bgcol=000001/linkcol=0f91ff/transparent=true/"
            }
        ];

        // Function to update all bandcamp players with fade effect
        function updateBandcampPlayers(isDarkMode) {
            // Fade out
            playersContainer.classList.add('fading');
            
            // Change src after fade out (1.5 seconds for fade out)
            setTimeout(() => {
                playerData.forEach((player, index) => {
                    const iframe = document.getElementById(`player-${index}`);
                    iframe.src = isDarkMode ? player.dark : player.light;
                });
                
                // Fade in
                playersContainer.classList.remove('fading');
            }, 1500);
        }

        // Kiểm tra chế độ đã lưu trong localStorage
        const savedTheme = localStorage.getItem('theme') || 'light';
        if (savedTheme === 'dark') {
            htmlElement.classList.add('dark-mode');
            themeToggle.textContent = '☀️';
            updateBandcampPlayers(true);
        }

        // Xử lý sự kiện click vào nút
        themeToggle.addEventListener('click', () => {
            if (htmlElement.classList.contains('dark-mode')) {
                htmlElement.classList.remove('dark-mode');
                themeToggle.textContent = '🌙';
                localStorage.setItem('theme', 'light');
                updateBandcampPlayers(false);
            } else {
                htmlElement.classList.add('dark-mode');
                themeToggle.textContent = '☀️';
                localStorage.setItem('theme', 'dark');
                updateBandcampPlayers(true);
            }
        });
    </script>
</body>
</html>
